name: TechMart CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ───────────────── FRONTEND ─────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: client/dist


  # ───────────────── BACKEND ─────────────────
  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Basic syntax check
        run: node -c src/app.js


  # ───────────────── DOCKER (OPTIONAL) ─────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t techmart-api .


  # ───────────────── DEPLOY ─────────────────
  deploy:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"